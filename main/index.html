<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar Markdown Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="ui-mode" class="container">
        <header>
            <button id="theme-toggle" class="theme-toggle" title="Toggle Theme">🌓</button>
            <h1>Calendar Generator</h1>
            <p>Generate clean Markdown calendars</p>
        </header>

        <div id="error-message"></div>

        <div class="controls">
            <div class="control-group">
                <label for="view">View</label>
                <select id="view">
                    <option value="Month">Month</option>
                    <option value="Year" selected>Year</option>
                </select>
            </div>
            <div class="control-group">
                <label for="year">Year</label>
                <input type="number" id="year" placeholder="YYYY">
            </div>
            <div class="control-group" id="month-group">
                <label for="month">Month</label>
                <select id="month">
                    <option value="1">January</option>
                    <option value="2">February</option>
                    <option value="3">March</option>
                    <option value="4">April</option>
                    <option value="5">May</option>
                    <option value="6">June</option>
                    <option value="7">July</option>
                    <option value="8">August</option>
                    <option value="9">September</option>
                    <option value="10">October</option>
                    <option value="11">November</option>
                    <option value="12">December</option>
                </select>
            </div>
            <div class="control-group hidden" id="columns-group">
                <label for="columns">Columns</label>
                <select id="columns">
                    <option value="1" selected>1 Column</option>
                    <option value="2">2 Columns</option>
                    <option value="3">3 Columns</option>
                    <option value="continuous">Continuous</option>
                </select>
            </div>
            <div class="control-group">
                <label for="startDay">Start Day</label>
                <select id="startDay">
                    <option value="Monday">Monday</option>
                    <option value="Sunday">Sunday</option>
                </select>
            </div>
            <div class="control-group">
                <label for="renderAs">Show as</label>
                <select id="renderAs">
                    <option value="html">Rendered HTML</option>
                    <option value="markdown" selected>Raw Markdown</option>
                    <option value="text">Plain Text</option>
                </select>
            </div>
        </div>

        <div class="buttons">
            <button id="copy-markdown-btn" class="btn-secondary">📋 Copy to Clipboard</button>
            <button id="copy-link-btn" class="btn-secondary">🔗 Copy Shareable Link</button>
        </div>

        <div class="preview-header">
            <h2>Preview</h2>
        </div>
        <div id="output"></div>
    </div>

    <div id="raw-mode" class="hidden">
        <pre id="raw-output"></pre>
    </div>

    <script src="./bundle.js"></script>
</body>

</html>
